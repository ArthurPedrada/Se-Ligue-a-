<!DOCTYPE html>
<html>
<head>
    <title>Editar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Editar compromisso</h2>

    <form method="POST">
        <input type="text" name="title" value="{{ event.title }}" required class="form-control mb-2">

        <input type="date" name="date" value="{{ event.date.strftime('%Y-%m-%d') }}" required class="form-control mb-2">

        <input type="time" name="time" value="{{ event.time.strftime('%H:%M') }}" required class="form-control mb-2">

        <textarea name="description" class="form-control mb-2">{{ event.description }}</textarea>

        <button type="submit" class="btn btn-success">Salvar</button>
    </form>

    <br>
    <a href="/" class="btn btn-secondary">Voltar</a>

</div>

</body>
</html>
