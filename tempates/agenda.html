<!DOCTYPE html>
<html>
<head>
    <title>Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Agenda</h2>

    <form action="/create" method="POST" class="mb-4">
        <input type="text" name="title" placeholder="Título" required class="form-control mb-2">
        <input type="date" name="date" required class="form-control mb-2">
        <input type="time" name="time" required class="form-control mb-2">
        <textarea name="description" class="form-control mb-2"></textarea>

        <button type="submit" class="btn btn-primary">Adicionar</button>
    </form>

    <hr>

    {% for event in events %}
        <div class="card mb-3 p-3">

            <strong>{{ event.title }}</strong>

            {% if event.date == hoje %}
                <div class="text-danger">🔥 HOJE</div>
            {% endif %}

            <div>{{ event.date }} - {{ event.time }}</div>
            <div>{{ event.description }}</div>

            <div class="mt-2">
                <a href="/edit/{{ event.id }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/delete/{{ event.id }}" class="btn btn-danger btn-sm">Excluir</a>
            </div>

        </div>
    {% else %}
        <p>Nenhum compromisso ainda.</p>
    {% endfor %}

</div>

</body>
</html>
